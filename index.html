<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilawal Ali | SOC Analyst & Cybersecurity Researcher</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav id="navbar">
    <div class="nav-container">
      <div class="nav-logo">BILAWAL<span class="neon">ALI</span></div>
      <div class="nav-links" id="nav-links"></div>
      <button class="nav-toggle" id="nav-toggle">☰</button>
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero">
    <div class="hero-content">
      <div class="hero-text">
        <div class="badge" id="hero-badge"></div>
        <h1 id="hero-name"></h1>
        <h2 id="hero-title"></h2>
        <p id="hero-bio"></p>
        <div class="hero-buttons">
          <a href="resume/Bilawal_Ali_Resume.pdf" download class="btn primary">Download Resume</a>
          <a href="#contact" class="btn secondary">Get In Touch</a>
        </div>
      </div>
      <div class="hero-visual">
        <img id="profile-img" src="assets/profile/bilawal.jpg" alt="Bilawal Ali">
      </div>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
  </section>

  <!-- Skills -->
  <section id="skills" class="section">
    <div class="container">
      <h2 class="section-title">Technical <span class="neon">Arsenal</span></h2>
      <div class="skills-grid" id="skills-grid"></div>
    </div>
  </section>

  <!-- Experience -->
  <section id="experience" class="section sec-alt">
    <div class="container">
      <h2 class="section-title">Professional <span class="neon">Journey</span></h2>
      <div class="timeline" id="experience-timeline"></div>
    </div>
  </section>

  <!-- Certifications -->
  <section id="certifications" class="section">
    <div class="container">
      <h2 class="section-title">Certifications &amp; Credentials</h2>
      <div class="card-grid" id="cert-grid"></div>
    </div>
  </section>

  <!-- Projects -->
  <section id="projects" class="section sec-alt">
    <div class="container">
      <h2 class="section-title">Featured <span class="neon">Projects</span></h2>
      <div class="card-grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- Vulnerabilities -->
  <section id="vulnerabilities" class="section">
    <div class="container">
      <h2 class="section-title">Vulnerability <span class="neon">Research</span></h2>
      <div class="card-grid" id="vuln-grid"></div>
    </div>
  </section>

  <!-- Achievements -->
  <section id="achievements" class="section sec-alt">
    <div class="container">
      <h2 class="section-title">Achievements &amp; Recognition</h2>
      <div class="card-grid" id="ach-grid"></div>
    </div>
  </section>

  <!-- Education -->
  <section id="education" class="section">
    <div class="container">
      <h2 class="section-title">Education</h2>
      <div class="edu-card" id="education-card"></div>
    </div>
  </section>

  <!-- Currently Learning -->
  <section id="learning" class="section sec-alt">
    <div class="container">
      <h2 class="section-title">Currently <span class="neon">Learning</span></h2>
      <div class="learning-grid" id="learning-grid"></div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="section">
    <div class="container">
      <h2 class="section-title">Let's <span class="neon">Connect</span></h2>
      <div class="contact-grid" id="contact-grid"></div>
    </div>
  </section>

  <footer>
    <p>© 2026 Bilawal Ali • SOC Analyst & Cybersecurity Researcher</p>
  </footer>

  <script src="portfolio-data.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
